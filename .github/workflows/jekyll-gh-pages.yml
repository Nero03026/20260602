# 專門用來建立與部屬 Vue 專案到 GitHub Pages 的工作流程
name: Deploy Vue site to GitHub Pages

on:
  # 當有變更推送到 main 分支時觸發
  push:
    branches: ["main"]

  # 允許在 GitHub Actions 頁面手動觸發
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限，允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 避免多個部署同時執行，確保順序
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. 編譯工作 (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 設定 Node.js 環境（Vue 需要 Node）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 可以根據你的專案調整 Node 版本
          cache: 'npm'     # 自動快取 npm 依賴，加快後續打包速度

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 安裝專案依賴項目
      - name: Install dependencies
        run: npm install

      # 打包編譯 Vue 專案
      - name: Build Vue Project
        run: npm run build

      # 上傳打包後的靜態檔案 (Vue 預設打包在 dist 資料夾)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 注意：如果是舊版 Vue CLI 可能是 ./dist，Vite 預設也是 ./dist
          path: ./dist

  # 2. 部屬工作 (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5